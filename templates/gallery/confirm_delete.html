{% extends "base.html" %}
{% block title %}Delete Photo{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger display-4"></i>
        <h3 class="mt-3">Delete this photo?</h3>
        <p class="text-muted">
          You are about to permanently delete
          <strong>"{{ photo.title }}"</strong>. This cannot be undone.
        </p>

        <img src="{{ photo.image.url }}" class="img-fluid rounded shadow-sm my-3 gallery-img"
             alt="{{ photo.title }}"/>

        <form method="POST" action="{% url 'photo-delete' photo.pk %}">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-2 mt-3">
            <a href="{% url 'photo-detail' photo.pk %}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i> Cancel
            </a>
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-trash me-1"></i> Yes, Delete
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
