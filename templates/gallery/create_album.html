{% extends "base.html" %}
{% block title %}Create Album{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="mb-4">
          <i class="bi bi-collection-fill text-info me-2"></i>Create Album
        </h3>
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
            {% endif %}
          </div>
          {% endfor %}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-info text-white btn-lg">
              <i class="bi bi-plus-circle me-1"></i> Create Album
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
